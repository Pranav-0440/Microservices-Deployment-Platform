apiVersion: v1
kind: ConfigMap
metadata:
  name: config-repo-configmap
data:
  application.yml: |
    eureka:
      client:
        service-url:
          defaultZone: http://eureka-server:8761/eureka/
        registry-fetch-interval-seconds: 5
      instance:
        prefer-ip-address: true
        lease-renewal-interval-in-seconds: 5

    management:
      endpoints:
        web:
          exposure:
            include: health,prometheus,info
      endpoint:
        prometheus:
          enabled: true
        health:
          show-details: always
      metrics:
        tags:
          application: ${spring.application.name}

  api-gateway.yml: |
    server:
      port: 8080

    spring:
      cloud:
        gateway:
          globalcors:
            cors-configurations:
              '[/**]':
                allowedOrigins: "*"
                allowedMethods:
                  - GET
                  - POST
                  - PUT
                  - DELETE
                  - OPTIONS
                allowedHeaders: "*"
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/api/users/**
            - id: product-service
              uri: lb://PRODUCT-SERVICE
              predicates:
                - Path=/api/products/**
            - id: order-service
              uri: lb://ORDER-SERVICE
              predicates:
                - Path=/api/orders/**
            - id: payment-service
              uri: lb://PAYMENT-SERVICE
              predicates:
                - Path=/api/payments/**

    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970

  user-service.yml: |
    server:
      port: 8081

    spring:
      datasource:
        url: jdbc:mysql://${MYSQL_HOST:mysql-db}:${MYSQL_PORT:3306}/user_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:password}
        driver-class-name: com.mysql.cj.jdbc.Driver
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQLDialect

    jwt:
      secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      expiration: 86400000

  product-service.yml: |
    server:
      port: 8082

    spring:
      datasource:
        url: jdbc:mysql://${MYSQL_HOST:mysql-db}:${MYSQL_PORT:3306}/product_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:password}
        driver-class-name: com.mysql.cj.jdbc.Driver
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQLDialect

  order-service.yml: |
    server:
      port: 8083

    spring:
      datasource:
        url: jdbc:mysql://${MYSQL_HOST:mysql-db}:${MYSQL_PORT:3306}/order_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:password}
        driver-class-name: com.mysql.cj.jdbc.Driver
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQLDialect
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
        producer:
          key-serializer: org.apache.kafka.common.serialization.StringSerializer
          value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  payment-service.yml: |
    server:
      port: 8084

    spring:
      datasource:
        url: jdbc:mysql://${MYSQL_HOST:mysql-db}:${MYSQL_PORT:3306}/payment_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:password}
        driver-class-name: com.mysql.cj.jdbc.Driver
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQLDialect

  notification-service.yml: |
    server:
      port: 8085

    spring:
      datasource:
        url: jdbc:mysql://${MYSQL_HOST:mysql-db}:${MYSQL_PORT:3306}/notification_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
        username: ${MYSQL_USER:root}
        password: ${MYSQL_PASSWORD:password}
        driver-class-name: com.mysql.cj.jdbc.Driver
      jpa:
        hibernate:
          ddl-auto: update
        show-sql: false
        properties:
          hibernate:
            dialect: org.hibernate.dialect.MySQLDialect
      kafka:
        bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:kafka:9092}
        consumer:
          group-id: notification-group
          key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
          value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
          properties:
            spring.json.trusted.packages: "*"
