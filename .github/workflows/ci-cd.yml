name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set up Java JDK 21
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Step 3: Compile, run tests, and package executable JARs
      - name: Build and Test with Maven
        run: |
          cd microservices
          mvn clean package

      # Step 4: Set up Docker Buildx for multi-stage building
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 5: Build Docker images locally to verify builds
      - name: Build Docker Images
        run: |
          docker build -t eureka-server:latest microservices/eureka-server
          docker build -t config-server:latest microservices/config-server
          docker build -t api-gateway:latest microservices/api-gateway
          docker build -t user-service:latest microservices/user-service
          docker build -t product-service:latest microservices/product-service
          docker build -t order-service:latest microservices/order-service
          docker build -t payment-service:latest microservices/payment-service
          docker build -t notification-service:latest microservices/notification-service
