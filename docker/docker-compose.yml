

services:
  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: password
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 5

  eureka-server:
    build:
      context: ../microservices/eureka-server
    container_name: eureka-server
    ports:
      - "8761:8761"
    environment:
      - EUREKA_CLIENT_REGISTER_WITH_EUREKA=false
      - EUREKA_CLIENT_FETCH_REGISTRY=false

  config-server:
    build:
      context: ../microservices/config-server
    container_name: config-server
    ports:
      - "8888:8888"
    depends_on:
      - eureka-server
    volumes:
      - ../microservices/config-repo:/config-repo
    environment:
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/

  api-gateway:
    build:
      context: ../microservices/api-gateway
    container_name: api-gateway
    restart: on-failure
    ports:
      - "8080:8080"
    depends_on:
      - config-server
      - eureka-server
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_SERVER_URL=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/

  user-service:
    build:
      context: ../microservices/user-service
    container_name: user-service
    restart: on-failure
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_started
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MYSQL_HOST=mysql-db

  product-service:
    build:
      context: ../microservices/product-service
    container_name: product-service
    restart: on-failure
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_started
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MYSQL_HOST=mysql-db

  payment-service:
    build:
      context: ../microservices/payment-service
    container_name: payment-service
    restart: on-failure
    depends_on:
      mysql-db:
        condition: service_healthy
      config-server:
        condition: service_started
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MYSQL_HOST=mysql-db

  order-service:
    build:
      context: ../microservices/order-service
    container_name: order-service
    restart: on-failure
    depends_on:
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MYSQL_HOST=mysql-db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

  notification-service:
    build:
      context: ../microservices/notification-service
    container_name: notification-service
    restart: on-failure
    depends_on:
      mysql-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      config-server:
        condition: service_started
    environment:
      - CONFIG_SERVER_URL=http://config-server:8888
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - MYSQL_HOST=mysql-db
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092

volumes:
  mysql-data:
